# Deploy campaigner to Hetzner k3s on every push to main.
# Pattern: build all 3 images on GH-hosted runners â push to GHCR â deploy from
# in-cluster self-hosted runner (gh-runner-campaigner pod in the gh-runners
# namespace). Documented in docs/CI_CD.md.
#
# Triggers: push to main ONLY. No workflow_dispatch, no PR. Push to main = ship.
# A "full deployment" runs every time â all 3 images rebuilt, web rolled,
# webhook image bumped (replicas: 0 so no rollout), all 7 CronJobs bumped,
# DB migrations re-applied idempotently, smoke test asserts /api/health == 200.
#
# Structural state (Deployments, Services, Ingress, Secrets, StatefulSet) is
# NOT managed by CI. It lives at ~/projects/bemtech/setup/hetzner/manifests/
# campaigner/ (private to the operator) and is applied via apply.sh. CI only
# mutates image tags + applies migrations.
#
# Required GitHub Actions secrets:
#   GHCR_PAT â PAT owned by `roihala` with `write:packages`. Same token is
#              mounted into the in-cluster runner via the SOPS-encrypted
#              gh-runners/gh-runner-pat Secret on the Hetzner side.

name: Deploy to Hetzner

on:
  push:
    branches: [main]

env:
  GHCR_IMAGE_AGENT: ghcr.io/bmtech-digital/campaigner-agent
  GHCR_IMAGE_WEB: ghcr.io/bmtech-digital/campaigner-web
  GHCR_IMAGE_WEBHOOK: ghcr.io/bmtech-digital/campaigner-webhook
  NAMESPACE: campaigner
  SMOKE_URL: https://campaigner.aiweon.co.il

jobs:
  build-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: bmtech-digital
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push agent image
        run: |
          docker build \
            -t "$GHCR_IMAGE_AGENT:${GITHUB_SHA}" \
            -t "$GHCR_IMAGE_AGENT:latest" \
            -f dockerfiles/agent.dockerfile \
            .
          docker push "$GHCR_IMAGE_AGENT:${GITHUB_SHA}"
          docker push "$GHCR_IMAGE_AGENT:latest"

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: bmtech-digital
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push web image
        run: |
          docker build \
            -t "$GHCR_IMAGE_WEB:${GITHUB_SHA}" \
            -t "$GHCR_IMAGE_WEB:latest" \
            -f dockerfiles/web.dockerfile \
            web
          docker push "$GHCR_IMAGE_WEB:${GITHUB_SHA}"
          docker push "$GHCR_IMAGE_WEB:latest"

  build-webhook:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: bmtech-digital
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push webhook image
        run: |
          docker build \
            -t "$GHCR_IMAGE_WEBHOOK:${GITHUB_SHA}" \
            -t "$GHCR_IMAGE_WEBHOOK:latest" \
            -f dockerfiles/webhook.dockerfile \
            webhook
          docker push "$GHCR_IMAGE_WEBHOOK:${GITHUB_SHA}"
          docker push "$GHCR_IMAGE_WEBHOOK:latest"

  deploy:
    needs: [build-agent, build-web, build-webhook]
    runs-on: [self-hosted, linux, hetzner, campaigner]
    steps:
      - uses: actions/checkout@v4

      # myoung34/github-runner image doesn't ship kubectl â install it
      # fresh on each run. Cluster auth is implicit via the in-cluster
      # ServiceAccount (gh-runner-campaigner) â kubectl auto-discovers it
      # via /var/run/secrets/kubernetes.io/serviceaccount.
      - uses: azure/setup-kubectl@v4

      - name: Apply migrations (idempotent)
        # Tolerates "already exists" / "duplicate" so re-runs don't fail.
        # Any other error aborts the deploy. Migrations are checked out from
        # the same git SHA we're deploying â schema and code stay in lockstep.
        run: |
          for f in $(ls migrations/*.sql | sort); do
            printf "  â %s â¦ " "$(basename "$f")"
            if kubectl exec -n "$NAMESPACE" -i postgres-0 -- \
                 psql -U campaigner -d campaigner_dev -v ON_ERROR_STOP=1 -q < "$f" \
                 2>/tmp/mig-err.txt; then
              echo "ok"
            elif grep -qE 'already exists|duplicate' /tmp/mig-err.txt; then
              echo "skipped (already applied)"
            else
              echo "FAILED"
              cat /tmp/mig-err.txt
              exit 1
            fi
          done

      - name: Roll web Deployment
        run: |
          kubectl set image deployment/web \
            web="$GHCR_IMAGE_WEB:${GITHUB_SHA}" \
            -n "$NAMESPACE"
          kubectl rollout status deployment/web -n "$NAMESPACE" --timeout=300s

      - name: "Update webhook Deployment image (replicas: 0 â no rollout to wait for)"
        # Bumping the image even at replicas: 0 means a future scale-up picks
        # up the latest SHA automatically.
        run: |
          kubectl set image deployment/webhook \
            webhook="$GHCR_IMAGE_WEBHOOK:${GITHUB_SHA}" \
            -n "$NAMESPACE"

      - name: Update all 7 agent CronJobs
        # CronJob image changes take effect on the *next* scheduled run.
        # Active Jobs (already running) keep their existing image.
        run: |
          for cj in \
            agent-daily-observe \
            agent-execute-approvals \
            agent-daily-ab-decisions \
            agent-midday-health-check \
            agent-weekly-creative \
            agent-weekly-competitive-research \
            agent-weekly-self-audit
          do
            echo "  â $cj"
            kubectl set image cronjob/"$cj" \
              agent="$GHCR_IMAGE_AGENT:${GITHUB_SHA}" \
              -n "$NAMESPACE"
          done

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Web /api/health â 200
        # Retries cover the rollout's last-pod-transition window.
        run: |
          code=$(curl -sS --retry 5 --retry-delay 10 -o /tmp/body.txt \
                      -w "%{http_code}" "$SMOKE_URL/api/health")
          echo "HTTP $code"
          cat /tmp/body.txt
          echo
          test "$code" = "200"
