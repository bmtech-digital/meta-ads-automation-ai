# Apply via `make secrets` (locally) or the GitHub Actions deploy workflow (CI).
# Both pipe this file through `envsubst`, so values come from env vars — never
# commit real secrets. UPPER_CASE keys let workloads pull the bundle with
# `envFrom: secretRef`.
#
# Vertex AI Imagen access uses a separate Secret named `gcp-vertexai-credentials`
# (key: credentials.json). Locally: `make gcp_credentials_secret`. In CI: created
# from the GCP_SA_KEY GitHub Secret automatically.
apiVersion: v1
kind: Secret
metadata:
  name: campaigner-secrets
  namespace: campaigner
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

  META_APP_ID: "${META_APP_ID}"
  META_APP_SECRET: "${META_APP_SECRET}"
  META_ACCESS_TOKEN: "${META_ACCESS_TOKEN}"
  META_AD_ACCOUNT_ID: "${META_AD_ACCOUNT_ID}"
  META_PAGE_ID: "${META_PAGE_ID}"

  SUPABASE_URL: "${SUPABASE_URL}"
  SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"

  DATABASE_URL: "${DATABASE_URL}"

  BUSINESS_ID: "${BUSINESS_ID}"
